<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Contact Form</title>
</head>
<body>
    <h1>Contact Information</h1>
    <form id="contact_form">
        <div>
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" value="John" />
        </div>
        <div>
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" value="Doe" />
        </div>
        <div>
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" value="(555) 123-4567" />
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="john.doe@example.com" />
        </div>
        <div>
            <label for="dob">Date of Birth</label>
            <input type="text" id="dob" name="dob" value="01/15/1990" />
        </div>
        <div>
            <label for="address">Address</label>
            <input type="text" id="address" name="address" value="123 Main St" />
        </div>
        <div>
            <label for="address2">Address 2</label>
            <input type="text" id="address2" name="address2" value="Apt 4B" />
        </div>
        <div>
            <label for="city">City</label>
            <input type="text" id="city" name="city" value="Springfield" />
        </div>
        <div>
            <label for="state">State</label>
            <input type="text" id="state" name="state" value="IL" />
        </div>
        <div>
            <label for="zipcode">Zip Code</label>
            <input type="text" id="zipcode" name="zipcode" value="62701" />
        </div>
    </form>
</body>
</html>
