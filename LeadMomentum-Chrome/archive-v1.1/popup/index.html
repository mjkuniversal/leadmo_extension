<!DOCTYPE html>
<html>
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="select2.min.css" />
        <link rel="stylesheet" type="text/css" href="style.css" />
    </head>
    <body>
        <div id="wrapper">
            <div id="logo_box">
                <img src="logo.png" id="logo" />
            </div>    
            <div id="contact_box">
                <h3>Contact</h3>
                <div id="contact_box_left">
                    <p><b>First name:</b> <span id="first_name"></span></p>
                    <p><b>Last name:</b> <span id="last_name"></span></p>
                    <p><b>Phone:</b> <span id="phone"></span></p>
                    <p><b>Email:</b> <span id="email"></span></p>
                    <p><b>Date of birth:</b> <span id="dob"></span></p>
                </div>
                <div id="contact_box_right">
                    <p><b>Address1:</b> <span id="address1"></span></p>
                    <p><b>Address2:</b> <span id="address2"></span></p>
                    <p><b>City:</b> <span id="city"></span></p>
                    <p><b>State:</b> <span id="state"></span></p>
                    <p><b>Zipcode:</b> <span id="zipcode"></span></p>
                </div>
            </div>
            <div style="clear:both;"></div>
            <br /><hr /><br />
            <div id="tags_box">
                <label>Tags</label><br />
                <a id="send_to_leadmomentum" class="api_box_button select_button">Send To LeadMomentum</a>
            </div>
            <br /><hr /><br />
            <div id="workflows_box">
                <label>Workflows</label><br />
                <a id="add_to_workflow" class="api_box_button select_button">Add to Workflow</a>
            </div>
            <br /><hr /><br />
            <div id="api_key_box">
                <div class="api_box_item">
                    <input type="text" placeholder="LeadMomentum Api Name" id="api_name">
                </div>
                <div class="api_box_item">
                    <input type="text" placeholder="LeadMomentum Api Key" id="api_key">
                </div>
                <div class="api_box_item">
                    <a id="save_api_key" class="api_box_button">Add</a>
                </div>
                <br /><hr /><br />
                <div id="api_key_items">
                    <a id="select_api_key" class="api_box_button select_button">Select</a>
                </div>
            </div>
            <br /><hr /><br />
            <div id="phone_box">                
                <input type="text" id="landlinescrubber_api_key" placeholder="LandlineScrubber Api Key" />
                <br /><br />
                <input type="text" id="phone_for_check" placeholder="Phone" />
                <a id="check_phone" class="api_box_button">Check</a>
                <p><b>DNC: </b> <span id="dnc"></span></p>
                <p><b>Line Type: </b> <span id="linetype"></span></p>
            </div>

        </div>
        <script src="../jquery.min.js"></script>       
        <script src="select2.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
